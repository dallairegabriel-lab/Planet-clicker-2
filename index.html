<script>
let supportChoisi = "pc";
let currentGalaxy = "normale";
const PASS_OWNER = "admin123";
const PASS_ADMIN = "admin321";

let ownerConnected = false;
let adminConnected = false;

const BASE_ACHIEVEMENTS = [
    { id: "cadet", name: "Cadet", desc: "10 Clics", check: () => s.totalClicks >= 10 },
    { id: "soldat", name: "Soldat", desc: "100 Clics", check: () => s.totalClicks >= 100 },
    { id: "mineur", name: "Mineur", desc: "500 Clics", check: () => s.totalClicks >= 500 },
    { id: "explorateur", name: "Explorateur", desc: "Zone 5", check: () => s.zone >= 5 },
    { id: "elite", name: "Élite", desc: "1 Prestige", check: () => s.prestige >= 1 },
    { id: "legende", name: "Légende", desc: "5 Prestiges", check: () => s.prestige >= 5 }
];

let defaultState={ 
    credits:0, honeyCredits:0, crystalCredits:0, plasmaCredits:0,
    power:1, drones:0, scanner:1, zone:1, maxzone:1, prestige:0, 
    pCost:20, dCost:70, sCost:120, shards:0, up1:0, up2:0, rjCoins:0, 
    totalClicks:0, rjClicMult:1, rjDroneMult:1, rjDiscount: 1, rjSpeedBonus: 1, ownedTitles:[], equippedTitle:"" 
};
let s=JSON.parse(JSON.stringify(defaultState));

let planets=[{name:"Terra",emoji:"🌍"},{name:"Mars",emoji:"🔴"},{name:"Neptune",emoji:"🔵"},{name:"Nova Prime",emoji:"🟣"},{name:"Titan",emoji:"🪐"},{name:"Sol",emoji:"☀️"}];
let galaxiesData = {
    normale: { name: "Terra", emoji: "🌍", moneyAttr: "credits" },
    honey: { name: "Mellis (Honey)", emoji: "🍯", moneyAttr: "honeyCredits" },
    crystal: { name: "Crystalia", emoji: "🔮", moneyAttr: "crystalCredits" },
    plasma: { name: "Pyros (Plasma)", emoji: "🔥", moneyAttr: "plasmaCredits" }
};

let combo=0; let droneInterval = null;
let isFrozen = false; let adminBoostMultiplier = 1;

function choisirSupport(mode) {
    supportChoisi = mode;
    document.getElementById("dev-pc").classList.remove("active");
    document.getElementById("dev-mobile").classList.remove("active");
    document.getElementById("dev-" + mode).classList.add("active");
}
function basculerAuth(mode) {
    if(mode === 'register') {
        document.getElementById("auth-login-view").style.display = "none";
        document.getElementById("auth-register-view").style.display = "block";
    } else {
        document.getElementById("auth-register-view").style.display = "none";
        document.getElementById("auth-login-view").style.display = "block";
    }
}
function gererInscription() {
    let user = document.getElementById("auth-reg-user").value.trim();
    let pass = document.getElementById("auth-reg-pass").value;
    if(!user || !pass) return;
    localStorage.setItem("gm_pass_" + user, pass);
    basculerAuth('login');
}
function gererConnexion() {
    let user = document.getElementById("auth-log-user").value.trim();
    let pass = document.getElementById("auth-log-pass").value;
    if(localStorage.getItem("gm_pass_" + user) === pass) {
        document.getElementById("player").value = user;
        document.getElementById("auth-overlay").style.display = "none";
        const interfaceJeu = document.getElementById("game-interface");
        interfaceJeu.style.display = "block";
        interfaceJeu.className = (supportChoisi === "mobile") ? "mode-mobile" : "mode-pc";
        loadPlayerSave();
        genererQuetes();
        setTimeout(() => {
            let activePrefix = s.equippedTitle ? `[${s.equippedTitle}] ` : "";
            socket.emit("envoyerMessageGlobal", { pseudo: activePrefix + user, texte: "<i>vient de se connecter.</i>" });
        }, 800);
    }
}

function changerGalaxie(type) {
    if(type === 'crystal' && s.prestige < 2) { alert("🚫 Requis: Prestige 2 ou supérieur !"); return; }
    if(type === 'plasma' && s.prestige < 5) { alert("🚫 Requis: Prestige 5 ou supérieur !"); return; }
    
    currentGalaxy = type;
    document.body.className = (type !== "normale") ? type + "-theme" : "";
    document.getElementById("btn-goto-honey").style.display = (type === "normale") ? "inline-block" : "none";
    document.getElementById("btn-goto-crystal").style.display = (type === "normale") ? "inline-block" : "none";
    document.getElementById("btn-goto-plasma").style.display = (type === "normale") ? "inline-block" : "none";
    document.getElementById("btn-leave-galaxy").style.display = (type !== "normale") ? "inline-block" : "none";
    ui();
}

function buyRJUpgrade(type) {
    if(type === 'clic' && s.rjCoins >= 5) { s.rjCoins -= 5; s.rjClicMult += 1; }
    if(type === 'drone' && s.rjCoins >= 8) { s.rjCoins -= 8; s.rjDroneMult += 1; }
    if(type === 'reduction' && s.rjCoins >= 12) { s.rjCoins -= 12; s.rjDiscount *= 0.9; }
    if(type === 'speed' && s.rjCoins >= 15) { s.rjCoins -= 15; s.rjSpeedBonus += 0.25; }
    ui(); save();
}

document.getElementById("planet").addEventListener("click", () => {
    if(isFrozen) return; s.totalClicks++;
    let currentAttr = galaxiesData[currentGalaxy].moneyAttr;
    let totalGain = s.power * s.scanner * s.rjClicMult * adminBoostMultiplier;
    
    if(currentGalaxy === "normale" && s.up2 > 0 && Math.random() < (s.up2 * 0.05)) { totalGain *= 3; }
    s[currentAttr] += totalGain;
    
    if(currentGalaxy === "normale") {
        combo++;
        document.getElementById("progress-bar").style.width = Math.min((combo / (s.zone * 20)) * 100, 100) + "%";
        if(combo >= (s.zone * 20)) { combo = 0; s.zone++; if(s.zone > s.maxzone) s.maxzone = s.zone; }
    } else {
        if(Math.random() < 0.02) s.rjCoins++;
    }
    ui();
});

function lancerProductionDrones() {
    if(isFrozen || s.drones <= 0) return;
    let currentAttr = galaxiesData[currentGalaxy].moneyAttr;
    let speedBonus = currentGalaxy === "normale" ? (1 + (s.up1 * 0.5)) : 1;
    let finalGain = s.drones * s.rjDroneMult * speedBonus * adminBoostMultiplier * (s.rjSpeedBonus || 1);
    
    s[currentAttr] += finalGain;
    if(finalGain > 0) ui();
}

function applyDiscount(baseCost) { return currentGalaxy !== "normale" ? baseCost * (s.rjDiscount || 1) : baseCost; }

function buyPower() { let attr = galaxiesData[currentGalaxy].moneyAttr; let cost = applyDiscount(s.pCost); if(s[attr] >= cost) { s[attr] -= cost; s.power++; s.pCost *= 1.35; ui(); } }
function buyDrone() { let attr = galaxiesData[currentGalaxy].moneyAttr; let cost = applyDiscount(s.dCost); if(s[attr] >= cost) { s[attr] -= cost; s.drones++; s.dCost *= 1.4; ui(); } }
function buyScanner() { let attr = galaxiesData[currentGalaxy].moneyAttr; let cost = applyDiscount(s.sCost); if(s[attr] >= cost) { s[attr] -= cost; s.scanner++; s.sCost *= 1.45; ui(); } }
function buyMaxPower() { for(let i=0;i<20;i++) buyPower(); }
function buyMaxDrone() { for(let i=0;i<20;i++) buyDrone(); }
function buyMaxScanner() { for(let i=0;i<20;i++) buyScanner(); }

function buyPrestigeUpgrade(id) {
    if(id === 1 && s.shards >= 2) { s.shards -= 2; s.up1++; ui(); }
    if(id === 2 && s.shards >= 3) { s.shards -= 3; s.up2++; ui(); }
}
function doPrestige() {
    if(s.credits >= 500000) { s.shards += Math.floor(Math.sqrt(s.credits / 500000)); s.credits = 0; s.zone = 1; s.power = 1; s.drones = 0; s.scanner = 1; s.pCost = 20; s.dCost = 70; s.sCost = 120; s.prestige++; ui(); save(); }
}

function toggleModal(id, open) {
    document.getElementById(id).style.display = open ? "block" : "none";
}

function togglePanel(type) {
    let panel = document.getElementById("panel-" + type);
    if(panel.style.display === "block") {
        panel.style.display = "none";
    } else {
        panel.style.display = "block";
    }
}

// --- SYSTÈME D'EXÉCUTION DES COMMANDES ---
function executerCommande(type) {
    const input = document.getElementById("input-" + type);
    const log = document.getElementById("log-" + type);
    const commande = input.value.trim();
    
    if (!commande) return;

    const nvLog = document.createElement("div");
    nvLog.textContent = "> " + commande;
    log.appendChild(nvLog);
    
    socket.emit("commandeAdmin", { 
        typePanel: type, 
        commande: commande, 
        pseudo: document.getElementById("player").value 
    });

    input.value = "";
    log.scrollTop = log.scrollHeight;
}

function loginPanel(type) {
    let input = document.getElementById("input-" + type);
    let log = document.getElementById("log-" + type);
    let btn = document.getElementById("btn-action-" + type);
    
    if (type === 'owner' && ownerConnected) { executerCommande('owner'); return; }
    if (type === 'admin' && adminConnected) { executerCommande('admin'); return; }

    if(type === 'owner' && input.value === PASS_OWNER) {
        ownerConnected = true;
        log.innerHTML = "<div style='color:#26ff63;'>[🔓 ACCÈS OWNER CONFORMÉ] Taper ~/help pour commencer.</div>";
        btn.textContent = "Envoyer";
        input.value = ""; input.type = "text"; 
        input.placeholder = "Taper une commande...";
    } else if(type === 'admin' && input.value === PASS_ADMIN) {
        adminConnected = true;
        log.innerHTML = "<div style='color:#26ff63;'>[🔓 MODÉRATION RECONNUE] Taper ~/help pour commencer.</div>";
        btn.textContent = "Envoyer";
        input.value = ""; input.type = "text";
        input.placeholder = "Taper une commande...";
    } else {
        alert("Clé d'accès incorrecte !");
    }
    log.scrollTop = log.scrollHeight;
}

function rafraichirInventaireTitres() {
    let wrapper = document.getElementById("titles-wrapper-v3");
    if(!wrapper) return;
    wrapper.innerHTML = "";
    
    BASE_ACHIEVEMENTS.forEach(ach => {
        let unlocked = ach.check();
        let row = document.createElement("div");
        row.className = "title-row-v3" + (s.equippedTitle === ach.name ? " active-v3" : "");
        
        if(unlocked) {
            let activeText = s.equippedTitle === ach.name ? "Équipé" : "Équiper";
            let btnClass = s.equippedTitle === ach.name ? "btn-equip-v3 equipped-v3" : "btn-equip-v3";
            row.innerHTML = `<span><strong>[${ach.name}]</strong> - ${ach.desc}</span>
                             <button class="${btnClass}" onclick="equiperTitre('${ach.name}')">${activeText}</button>`;
        } else {
            row.innerHTML = `<span class="title-locked-v3">🔒 [${ach.name}] - Bloqué (${ach.desc})</span>`;
        }
        wrapper.appendChild(row);
    });
}

function equiperTitre(nomTitre) {
    if(s.equippedTitle === nomTitre) { s.equippedTitle = ""; } else { s.equippedTitle = nomTitre; }
    ui(); save();
}

function genererQuetes() {
    let container = document.getElementById("quests-container");
    if(!container) return;
    container.innerHTML = `
        <div class="quest-item"><span>🎯 Atteindre 100 clics</span> <span>+1 RJ Coin</span></div>
        <div class="quest-item"><span>🌍 Atteindre la Zone 5</span> <span>+3 RJ Coins</span></div>
    `;
}

function save() {
    let user = document.getElementById("player").value;
    if(user) localStorage.setItem("gm_save_" + user, JSON.stringify(s));
}

function loadPlayerSave() {
    let user = document.getElementById("player").value;
    let local = localStorage.getItem("gm_save_" + user);
    if(local) { s = JSON.parse(local); ui(); }
}

function deconnexionComplete() { save(); location.reload(); }

setInterval(lancerProductionDrones, 1000);

function ui() {
    let currentAttr = galaxiesData[currentGalaxy].moneyAttr;
    document.getElementById("money").textContent = Math.floor(s[currentAttr]);
    document.getElementById("moneyTop").textContent = Math.floor(s[currentAttr]);
    document.getElementById("zone").textContent = s.zone;
    document.getElementById("prestige").textContent = s.prestige;
    document.getElementById("shards").textContent = s.shards;
    document.getElementById("rjCoins").textContent = s.rjCoins;
    document.getElementById("stat-clicks").textContent = s.totalClicks;
    document.getElementById("rjMultClic").textContent = s.rjClicMult;
    document.getElementById("rjMultDrone").textContent = s.rjDroneMult;
    
    document.getElementById("power").textContent = s.power; 
    document.getElementById("drones").textContent = s.drones; 
    document.getElementById("scanner").textContent = s.scanner;
    document.getElementById("pc").textContent = Math.floor(applyDiscount(s.pCost)); 
    document.getElementById("dc").textContent = Math.floor(applyDiscount(s.dCost)); 
    document.getElementById("sc").textContent = Math.floor(applyDiscount(s.sCost));
    
    if(currentGalaxy === "normale") {
        let currentPlanet = planets[(s.zone - 1) % planets.length]; 
        document.getElementById("planetName").textContent = currentPlanet.name; 
        document.getElementById("planet").textContent = currentPlanet.emoji;
    } else {
        document.getElementById("planetName").textContent = galaxiesData[currentGalaxy].name;
        document.getElementById("planet").textContent = galaxiesData[currentGalaxy].emoji;
    }
    document.getElementById("maxzone").textContent = s.maxzone;
    document.getElementById("up1Lvl").textContent = s.up1; 
    document.getElementById("up2Lvl").textContent = s.up2;
    rafraichirInventaireTitres();
}

// --- TOUCHES DE RACCOURCIS CLAVIER ---
window.addEventListener("keydown", (e) => {
    if(document.activeElement.tagName === "INPUT" || document.activeElement.tagName === "TEXTAREA") return;
    if(e.key === "1") togglePanel('owner');
    if(e.key === "2") togglePanel('admin');
});

const socket = io("https://galaxy-miner-server.onrender.com");
socket.on("majJoueursEnLigne", (total) => { document.getElementById("onlineCount").textContent = total; });
socket.on("recevoirMessageGlobal", (data) => {
    const chatBox = document.getElementById("chat-box");
    const nvMessage = document.createElement("div");
    nvMessage.innerHTML = `<strong>${data.pseudo} :</strong> ${data.texte}`;
    chatBox.appendChild(nvMessage); chatBox.scrollTop = chatBox.scrollHeight;
});

// --- RÉCEPTION DES ACTIONS DU SERVEUR ---

socket.on("retourCommande", (data) => {
    let actifLog = (ownerConnected && document.getElementById("panel-owner").style.display === "block") ? "log-owner" : "log-admin";
    const log = document.getElementById(actifLog);
    if(log) {
        const div = document.createElement("div");
        div.style.color = "#ffff55";
        div.style.whiteSpace = "pre-line"; // Gère les retours à la ligne propres pour l'aide
        div.textContent = data.texte;
        log.appendChild(div); log.scrollTop = log.scrollHeight;
    }
});

socket.on("alerteGlobale", (data) => {
    const alertBox = document.getElementById("global-chat-alert");
    alertBox.textContent = "📢 " + data.texte;
    alertBox.style.top = "20px";
    setTimeout(() => { alertBox.style.top = "-150px"; }, 6000);
});

socket.on("recevoirSpawnShop", () => {
    document.getElementById("secret-merchant-btn").style.display = "block";
    alert("🐻 L'Ours Marchand vient d'apparaître sur la carte ! Check le bouton en bas à droite.");
});

// Gestion des visuels cumulables et ciblés
socket.on("effetVisuelCumulable", (data) => {
    let monPseudo = document.getElementById("player").value.trim().toLowerCase();
    
    // Si la commande a une cible et que ce n'est pas moi, on ignore
    if (data.cible && data.cible.toLowerCase() !== monPseudo) return;

    // Application ou cumul des filtres et animations CSS
    if (data.action === "seisme") {
        document.body.classList.add("seisme-active");
    } else if (data.action === "blackout") {
        document.body.classList.add("blackout-active");
    } else if (data.action === "matrix") {
        document.body.classList.add("blur-active");
    } else if (data.action === "clearvisuals") {
        document.body.classList.remove("seisme-active", "blackout-active", "blur-active");
    }
});

function envoyerMessage() {
    const input = document.getElementById("chat-input"); 
    const texte = input.value.trim();
    let pseudo = document.getElementById("player").value.trim() || "Anonyme";
    let activePrefix = s.equippedTitle ? `[${s.equippedTitle}] ` : "";
    if (texte !== "") { 
        socket.emit("envoyerMessageGlobal", { pseudo: activePrefix + pseudo, texte: texte }); 
        input.value = "";
    }
}

document.getElementById("chat-input").addEventListener("keydown", function(event) {
    if (event.key === "Enter") { event.preventDefault(); envoyerMessage(); }
});

document.getElementById("input-owner").addEventListener("keydown", function(event) {
    if (event.key === "Enter") { event.preventDefault(); loginPanel('owner'); }
});

document.getElementById("input-admin").addEventListener("keydown", function(event) {
    if (event.key === "Enter") { event.preventDefault(); loginPanel('admin'); }
});

socket.on("gameVersion", (version) => { console.log("Version du serveur connectée :", version); });
</script>
